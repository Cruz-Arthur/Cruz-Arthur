<svg xmlns="http://www.w3.org/2000/svg" width="700" height="172" viewBox="0 0 700 172">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
    </style>
    <!-- Warm center glow to lift exposure -->
    <radialGradient id="expose" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#C4956A" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#C4956A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="172" fill="#0d1117" rx="6"/>
  <!-- Exposure lift -->
  <rect width="700" height="172" fill="url(#expose)" rx="6"/>

  <!-- Border — brighter -->
  <rect x="1" y="1" width="698" height="170" fill="none" stroke="#2d3d50" stroke-width="1" rx="6"/>

  <!-- Corner marks — brighter -->
  <line x1="18" y1="28" x2="38" y2="28" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="18" y1="28" x2="18" y2="48" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="662" y1="28" x2="682" y2="28" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="682" y1="28" x2="682" y2="48" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="18" y1="144" x2="38" y2="144" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="18" y1="124" x2="18" y2="144" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="662" y1="144" x2="682" y2="144" stroke="#7A7570" stroke-width="0.8"/>
  <line x1="682" y1="124" x2="682" y2="144" stroke="#7A7570" stroke-width="0.8"/>

  <!-- Header label -->
  <text x="18" y="18" class="mono" fill="#7A7570" font-size="8.5" letter-spacing="2.5">TRANSMISSÃO · SISTEMA ATIVO</text>

  <!-- Signal dots -->
  <circle cx="650" cy="14" r="2.5" fill="#8AA86A">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="660" cy="14" r="2.5" fill="#C4956A">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="670" cy="14" r="2.5" fill="#8AA86A">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Prompt prefix line 1 -->
  <text x="28" y="68" class="mono" fill="#7F9360" font-size="12">›</text>

  <!-- Main text line 1 — orange word flickers like bad contact -->
  <text x="42" y="68" class="mono" fill="#F5EDE3" font-size="13" letter-spacing="0.3">
    Trabalho na interseção entre
    <tspan fill="#C4956A" font-style="italic">
      <animate attributeName="opacity"
        values="1;1;0.06;1;1;0.06;0.85;0.06;1;1;1;0.05;1;1;0.06;0.06;0.88;1;1"
        keyTimes="0;0.07;0.075;0.08;0.22;0.35;0.355;0.36;0.37;0.5;0.65;0.66;0.665;0.8;0.87;0.875;0.88;0.89;1"
        dur="4.2s" repeatCount="indefinite"/>
       engenharia
    </tspan>
    <tspan fill="#F5EDE3"> e</tspan>
  </text>

  <!-- Prompt prefix line 2 -->
  <text x="28" y="92" class="mono" fill="#7F9360" font-size="12">›</text>

  <!-- Main text line 2 — orange, same flicker synced -->
  <text x="42" y="92" class="mono" fill="#C4956A" font-size="13" font-style="italic" letter-spacing="0.3">
    <animate attributeName="opacity"
      values="1;1;0.06;1;1;0.06;0.85;0.06;1;1;1;0.05;1;1;0.06;0.06;0.88;1;1"
      keyTimes="0;0.07;0.075;0.08;0.22;0.35;0.355;0.36;0.37;0.5;0.65;0.66;0.665;0.8;0.87;0.875;0.88;0.89;1"
      dur="4.2s" repeatCount="indefinite"/>
    experiência visual.
  </text>

  <!-- Divider line -->
  <line x1="28" y1="106" x2="672" y2="106" stroke="#2d3d50" stroke-width="0.6"/>

  <!-- Sub text — brighter green -->
  <text x="42" y="125" class="mono" fill="#A5C285" font-size="10.5" letter-spacing="0.8">
    Sistemas que processam o mundo como o olho humano nunca conseguiria.
  </text>

  <!-- Footer label -->
  <text x="18" y="162" class="mono" fill="#4a5060" font-size="8" letter-spacing="2">FIM DA TRANSMISSÃO</text>

  <!-- Blinking cursor -->
  <rect x="231" y="152" width="7" height="10" fill="#C4956A" rx="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Scan line -->
  <rect x="18" y="28" width="664" height="1.5" rx="1" opacity="0">
    <animate attributeName="y" from="28" to="148" dur="5s" repeatCount="indefinite" calcMode="linear"/>
    <animate attributeName="opacity" values="0;0.18;0.18;0" keyTimes="0;0.08;0.92;1" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
